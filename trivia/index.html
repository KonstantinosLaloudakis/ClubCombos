<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Combos Trivia | Olympiacos & Panathinaikos</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Load Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    
    <!-- Load the data generated by Python -->
    <script src="data.js"></script>
</head>
<body>
    <div class="app-container">
        
        <header>
            <div class="logo">
                <span class="logo-txt">CLUB</span><span class="logo-txt highlight">COMBOS</span>
            </div>
            <div class="score-panel">
                <div class="lives-container" id="lives-container">
                    <!-- Heart icons will go here -->
                </div>
                <div class="score-display">
                    Score: <span id="current-score">0</span>/<span id="max-score">9</span>
                </div>
            </div>
        </header>

        <main>
            <!-- Start Screen / Game Configurator -->
            <div id="start-screen" class="view-panel active">
                <div class="hero-box">
                    <h1>The Greek Giants Grid</h1>
                    <p>Name a player who played for <strong>both</strong> intersecting clubs. You have one guess for each cell.</p>
                    
                    <div class="config-options">
                        <h3>Select Grid Size</h3>
                        <div class="size-buttons">
                            <button class="btn btn-primary" data-size="3">2 x 3 Grid</button>
                            <button class="btn btn-outline" data-size="4">2 x 4 Grid</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Game Board Screen -->
            <div id="game-screen" class="view-panel">
                <div class="grid-wrapper">
                    <div class="grid-header" id="grid-header">
                        <div class="empty-corner"></div>
                        <!-- European Clubs will go here -->
                    </div>
                    
                    <div class="grid-body" id="grid-body">
                        <!-- Greek team rows and interactive cells go here -->
                    </div>
                </div>
                
                <div class="game-controls">
                    <button id="btn-give-up" class="btn btn-danger">Give Up</button>
                    <button id="btn-restart" class="btn btn-outline">New Game</button>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="view-panel">
                <div class="hero-box results-box">
                    <h1 id="end-title">Game Over!</h1>
                    <p id="end-message">You scored X out of Y.</p>
                    <button id="btn-play-again" class="btn btn-primary mt-4">Play Again</button>
                </div>
            </div>
            
        </main>

        <!-- Search Modal Overlay -->
        <div id="search-modal" class="modal-overlay hidden">
            <div class="modal-content glass-panel">
                <div class="modal-header">
                    <h3 id="modal-title">Search for a Player</h3>
                    <button id="btn-close-modal" class="btn-icon">×</button>
                </div>
                <div class="modal-search">
                    <input type="text" id="player-search-input" placeholder="Start typing a player name..." autocomplete="off" autofocus>
                </div>
                <div class="modal-results" id="search-results">
                    <!-- Search results populated by JS -->
                </div>
            </div>
        </div>

    </div>

    <!-- App Logic -->
    <script src="app.js"></script>
</body>
</html>
